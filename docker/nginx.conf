server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # No directory listing (replaces root .htaccess "Options -indexes")
    autoindex off;

    # Front-controller routing (replaces public/.htaccess): any request that
    # isn't a real file or directory is rewritten to index.php?url=<path>,
    # with the query string preserved via $args (the old [QSA] flag).
    location / {
        try_files $uri $uri/ @app;
    }

    location @app {
        rewrite ^/(.*)$ /index.php?url=$1&$args last;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
