server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    # No directory listing (replaces root .htaccess "Options -indexes")
    autoindex off;

    # Front-controller routing for the app served from /giftzone/public/.
    # Replaces public/.htaccess: any request that isn't a real file or
    # directory is rewritten to index.php?url=<path> (QSA preserved via $args).
    location /giftzone/public/ {
        try_files $uri $uri/ @giftzone;
    }

    location @giftzone {
        rewrite ^/giftzone/public/(.*)$ /giftzone/public/index.php?url=$1&$args last;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
