services:
  web:
    build: .
    # No host port publishing: on Coolify, Traefik owns ports 80/443 and routes
    # by domain. `expose` makes port 80 reachable on the internal proxy network
    # only. For local host access, see docker-compose.override.yml.
    expose:
      - "80"
    environment:
      # Coolify magic var: it sets the app's public URL from the domain you
      # configure in the UI and wires up Traefik routing to the exposed port.
      SERVICE_FQDN_WEB_80: ${SERVICE_FQDN_WEB:-/}
      # PUBLIC_ROOT must match the domain Coolify serves this on (e.g.
      # https://giftzone.example.com). Defaults to localhost for dev.
      PUBLIC_ROOT: ${PUBLIC_ROOT:-http://localhost}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-giftzone_db}
      # App connects as a dedicated non-root user (created by the db service
      # below). Never use root for the app on a public deploy.
      DB_USER: ${DB_USER:-giftzone}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    depends_on:
      db:
        condition: service_healthy
    # No source bind-mount here: in production (Coolify) the app code lives in
    # the image via the Dockerfile's `COPY . /var/www/html/`. Mounting ./ would
    # shadow that with the host dir. The dev live-mount is in the override.

  db:
    # Custom image bakes in database/giftzone_db.sql as an init script. We don't
    # bind-mount the seed because Coolify doesn't reliably deliver repo-file
    # bind mounts into containers (which left the schema empty on deploy).
    build:
      context: ./database
    environment:
      # Root password is a separate admin secret (the image requires one). The
      # app does NOT use root — it connects as MYSQL_USER below.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-giftzone_db}
      # On first boot the image creates this user with full grants on
      # MYSQL_DATABASE only. Must match the app's DB_USER/DB_PASSWORD above.
      MYSQL_USER: ${DB_USER:-giftzone}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    # No host port publishing: the web container reaches the db over the
    # internal compose network at host `db:3306`. Publishing 3306 would expose
    # MySQL on the server's public IP. For local DB access, see the override.
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  db_data:
