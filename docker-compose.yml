services:
  web:
    build: .
    # No host port publishing: on Coolify, Traefik owns ports 80/443 and routes
    # by domain. `expose` makes port 80 reachable on the internal proxy network
    # only. For local host access, see docker-compose.override.yml.
    expose:
      - "80"
    environment:
      # Coolify magic var: it sets the app's public URL from the domain you
      # configure in the UI and wires up Traefik routing to the exposed port.
      SERVICE_FQDN_WEB_80: ${SERVICE_FQDN_WEB:-/}
      # PUBLIC_ROOT must match the domain Coolify serves this on (e.g.
      # https://giftzone.example.com). Defaults to localhost for dev.
      PUBLIC_ROOT: ${PUBLIC_ROOT:-http://localhost}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-giftzone_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Live-mount source for development (overrides the image's COPY)
      - ./:/var/www/html

  db:
    image: mysql:8.0
    environment:
      # MySQL root password must match DB_PASSWORD since the app connects as root
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-giftzone_db}
    # No host port publishing: the web container reaches the db over the
    # internal compose network at host `db:3306`. Publishing 3306 would expose
    # MySQL on the server's public IP. For local DB access, see the override.
    volumes:
      - db_data:/var/lib/mysql
      # Mounted as .sql so MySQL's init runs it on first boot
      # (the .dump extension is ignored by docker-entrypoint-initdb.d)
      - ./database/giftzone_db.sql:/docker-entrypoint-initdb.d/giftzone_db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  db_data:
