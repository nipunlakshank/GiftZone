# Local development overrides — auto-merged by `docker compose` when run from
# this directory. Coolify invokes its compose file explicitly (`-f`) and does
# NOT merge this file, so these host-port publishes never reach the server.
services:
  web:
    ports:
      - "80:80"
    volumes:
      # Live-mount source for local dev (shadows the image's COPY so edits
      # are reflected without a rebuild). Not used on Coolify.
      - ./:/var/www/html

  db:
    ports:
      - "3306:3306"
